<!DOCTYPE html>
<html>
<head>
    <title>Baymax AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="chat-container">

    <div class="header">
        🤖 Baymax AI
    </div>

    <div id="chatbox">

        <div class="message bot-message">
            <div class="avatar">🤖</div>

            <div>
                <div class="bubble bot-bubble">
                    Hello! I am Baymax, your personal AI healthcare assistant. How can I help you today?
                </div>

                <div class="timestamp">
                    Just now
                </div>
            </div>
        </div>

    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask Baymax something...">

        <button onclick="sendMessage()">
            ➤
        </button>
    </div>

</div>

<script>

function getCurrentTime() {
    const now = new Date();

    return now.toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit'
    });
}

function addMessage(message, sender) {

    let chatbox = document.getElementById("chatbox");

    let messageDiv = document.createElement("div");
    messageDiv.classList.add("message");

    if(sender === "user") {
        messageDiv.classList.add("user-message");
    }
    else {
        messageDiv.classList.add("bot-message");
    }

    let avatar = document.createElement("div");
    avatar.classList.add("avatar");

    avatar.innerText = sender === "user" ? "🧑" : "🤖";

    let content = document.createElement("div");

    let bubble = document.createElement("div");
    bubble.classList.add("bubble");

    if(sender === "user") {
        bubble.classList.add("user-bubble");
    }
    else {
        bubble.classList.add("bot-bubble");
    }

    bubble.innerText = message;

    let timestamp = document.createElement("div");
    timestamp.classList.add("timestamp");
    timestamp.innerText = getCurrentTime();

    content.appendChild(bubble);
    content.appendChild(timestamp);

    messageDiv.appendChild(avatar);
    messageDiv.appendChild(content);

    chatbox.appendChild(messageDiv);

    chatbox.scrollTop = chatbox.scrollHeight;
}

function showTypingAnimation() {

    let chatbox = document.getElementById("chatbox");

    let typingDiv = document.createElement("div");

    typingDiv.classList.add("message", "bot-message");

    typingDiv.id = "typing";

    typingDiv.innerHTML = `
        <div class="avatar">🤖</div>

        <div class="bubble bot-bubble typing">
            <span></span>
            <span></span>
            <span></span>
        </div>
    `;

    chatbox.appendChild(typingDiv);

    chatbox.scrollTop = chatbox.scrollHeight;
}

function removeTypingAnimation() {

    let typing = document.getElementById("typing");

    if(typing) {
        typing.remove();
    }
}

function sendMessage() {

    let inputField = document.getElementById("userInput");

    let userText = inputField.value;

    if(userText.trim() === "") return;

    addMessage(userText, "user");

    inputField.value = "";

    showTypingAnimation();

    fetch(`/get?msg=${userText}`)

    .then(response => response.json())

    .then(data => {

        setTimeout(() => {

            removeTypingAnimation();

            addMessage(data.response, "bot");

        }, 1000);

    });
}

document.getElementById("userInput")

.addEventListener("keypress", function(event) {

    if(event.key === "Enter") {

        sendMessage();
    }
});

</script>

</body>
</html>
